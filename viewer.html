<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reader — Chamundeeswari Publications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/shared.css" />
    <link rel="stylesheet" href="assets/css/viewer.css" />
</head>
<body>

    <!-- ── Loading Screen ─────────────────────────── -->
    <div id="loading-screen">
        <div class="loader-content">
            <div class="loader-logo">
                <span class="loader-pub-name">CHAMUNDEESWARI</span>
                <span class="loader-pub-sub">PUBLICATIONS</span>
            </div>
            <div class="loader-bar-wrap">
                <div class="loader-bar" id="loader-bar"></div>
            </div>
            <p class="loader-text" id="loader-text">Loading…</p>
        </div>
    </div>

    <!-- ── Viewer Nav ─────────────────────────────── -->
    <nav class="viewer-nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                Library
            </a>
            <span class="nav-book-title" id="nav-book-title"></span>
            <button class="btn-icon" id="btn-fullscreen-nav" title="Fullscreen">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            </button>
        </div>
    </nav>

    <!-- ── Main Viewer ─────────────────────────────── -->
    <main class="viewer" id="viewer">

        <button class="nav-arrow nav-prev" id="btn-prev" title="Previous">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>

        <div class="book-stage" id="book-stage">
            <div id="book"></div>
        </div>

        <button class="nav-arrow nav-next" id="btn-next" title="Next">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>

    </main>

    <!-- ── Toolbar ─────────────────────────────────── -->
    <div class="toolbar" id="toolbar">

        <button class="btn-icon" id="btn-first" title="First page">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
        </button>
        <button class="btn-icon" id="btn-prev-tb" title="Previous">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>

        <div class="page-counter">
            <input type="number" id="page-input" min="1" title="Go to page" />
            <span class="page-sep">/</span>
            <span id="total-pages">—</span>
        </div>

        <button class="btn-icon" id="btn-next-tb" title="Next">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="btn-icon" id="btn-last" title="Last page">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
        </button>

        <div class="toolbar-divider"></div>

        <button class="btn-icon" id="btn-sound" title="Toggle sound">
            <svg id="icon-sound-on" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <svg id="icon-sound-off" style="display:none" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>

        <button class="btn-icon" id="btn-fullscreen-tb" title="Fullscreen">
            <svg id="icon-expand" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            <svg id="icon-compress" style="display:none" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
        </button>

    </div>

    <!-- ── Footer (minimal) ────────────────────────── -->
    <footer class="viewer-footer">
        <p>© 2026 Chamundeeswari Publications</p>
    </footer>

    <!-- ── Scripts ─────────────────────────────────── -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>
    <script src="assets/js/viewer.js"></script>

</body>
</html>
